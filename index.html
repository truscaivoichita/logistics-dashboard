<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Logistics dashboard to manage delivery points and routes"
    />
    <meta name="author" content="Voichita Maria Truscai" />
    <link rel="icon" href="assets/favicon.ico" />
    <title>Logistics Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <h1>Logistics Dashboard</h1>
    </header>

    <main>
      <section id="controls">
        <h2>Add Delivery Point</h2>
        <form id="locationForm">
          <label for="locationInput">Delivery Location</label>
          <input
            type="text"
            placeholder="Enter delivery location"
            id="locationInput"
            required
          />
          <button type="submit">Add Location</button>
        </form>
      </section>

      <section id="map">
        <h2>Map</h2>
        <div id="mapContainer" aria-label="Delivery map"></div>
      </section>

      <section id="routes">
        <h2>Routes</h2>
        <p>Route information will appear here</p>
      </section>
    </main>
    <script src="js/app.js"></script>
  </body>
</html>
